AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Action Guardrail — policy engine for AI agents. Deployed on always-free-tier
  AWS resources: Lambda, API Gateway HTTP API, DynamoDB, SSM Parameter Store.

Parameters:
  ApiKeyParamValue:
    Type: String
    Description: >
      Value for the guardrail API key stored in SSM Parameter Store.
      This key must be sent as X-API-Key header with every request.

Globals:
  Function:
    Timeout: 10
    MemorySize: 512
    Runtime: python3.12
    Architectures:
      - x86_64
    Tracing: Active

Resources:

  # ── Lambda function ──────────────────────────────────────────────────────
  GuardrailFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: app.lambda_handler.handler
      Environment:
        Variables:
          POLICY_FILE_PATH: policies/example_rules.yaml
          STORAGE_BACKEND: dynamodb
      Policies:
        # CloudWatch Logs (scoped to this function's log group)
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource:
                - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${GuardrailFunction}:*"
                - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${GuardrailFunction}:*:*"
        # DynamoDB audit-log table
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:Scan
              Resource: !GetAtt AuditTable.Arn
        # DynamoDB HITL queue table (query on GSI for pending listing)
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:GetItem
                - dynamodb:UpdateItem
                - dynamodb:Query
              Resource:
                - !GetAtt HitlTable.Arn
                - !Sub "${HitlTable.Arn}/index/*"
        # SSM Parameter Store (read API key on cold start)
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/guardrail/api-key"
      Events:
        HttpApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref GuardrailHttpApi
            Method: ANY
            Path: /{proxy+}

  # ── API Gateway HTTP API ─────────────────────────────────────────────────
  GuardrailHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Name: guardrail-http-api
      Description: HTTP API for Action Guardrail
      FailOnWarnings: true

  # ── DynamoDB: Audit Log ──────────────────────────────────────────────────
  AuditTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: guardrail-audit-log
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      # Production-scale note: add a GSI on (tool, created_at) if filtered
      # queries need to avoid full table scans at high volume.

  # ── DynamoDB: HITL Queue ─────────────────────────────────────────────────
  HitlTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: guardrail-hitl-queue
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: status-index
          KeySchema:
            - AttributeName: status
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  # ── SSM Parameter Store (standard tier, free) ───────────────────────────
  # NOTE: Stored as plain String, NOT SecureString. SecureString requires
  # either the default aws/ssm KMS key (free) or a custom KMS key (~$1/month).
  # For real secrets in production, use SecureString + KMS despite the small
  # cost. Here we use String to stay strictly within free tier.
  GuardrailApiKeyParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /guardrail/api-key
      Type: String
      Value: !Ref ApiKeyParamValue
      Description: API key for Action Guardrail /evaluate endpoint

  # ── CloudWatch Log Group (explicit retention to avoid unbounded growth) ──
  GuardrailFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${GuardrailFunction}"
      RetentionInDays: 7

Outputs:
  GuardrailApiEndpoint:
    Description: HTTP API endpoint URL
    Value: !Sub "https://${GuardrailHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  GuardrailFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt GuardrailFunction.Arn
