AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Action Guardrail — policy engine for AI agents.
  Deployed on always-free-tier AWS resources: Lambda (container image),
  API Gateway HTTP API, SSM Parameter Store. Uses existing MongoDB Atlas
  cluster (separate database name "guardrail_aws").

Parameters:
  ApiKeyParamValue:
    Type: String
    Description: >
      Value for the guardrail API key stored in SSM Parameter Store.
      This key must be sent as X-API-Key header with every request.

  MongoUriParamValue:
    Type: String
    Description: >
      MongoDB Atlas connection string. Same cluster as HF Spaces deployment,
      but using a different database name (MONGO_DB_NAME).

  MongoDbNameParamValue:
    Type: String
    Default: guardrail_aws
    Description: >
      MongoDB database name for this deployment. Defaults to "guardrail_aws"
      to keep data separate from the HF Spaces deployment (which uses
      "guardrail").

  GroqApiKeyParamValue:
    Type: String
    Default: ""
    Description: >
      Optional Groq API key for the /query endpoint. Leave empty if not
      needed.

Globals:
  Function:
    Timeout: 10
    MemorySize: 512
    Architectures:
      - x86_64

Resources:

  # ── Lambda function (container image via ECR) ─────────────────────────
  GuardrailFunction:
    Type: AWS::Serverless::Function
    Metadata:
      Dockerfile: Dockerfile.lambda
      DockerContext: .
      DockerTag: guardrail-lambda
    Properties:
      PackageType: Image
      ImageConfig:
        Command:
          - app.lambda_handler.handler
      Environment:
        Variables:
          POLICY_FILE_PATH: policies/example_rules.yaml
          STORAGE_BACKEND: mongo
      Policies:
        # SSM Parameter Store — read-only access to specific paths
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - ssm:GetParameter
              Resource:
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/guardrail/api-key"
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/guardrail/mongo-uri"
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/guardrail/mongo-db-name"
                - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/guardrail/groq-api-key"

  # ── HTTP API ──────────────────────────────────────────────────────────
  GuardrailHttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: guardrail-http-api
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - X-API-Key

  GuardrailHttpApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref GuardrailHttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${GuardrailFunction.Arn}/invocations"
      PayloadFormatVersion: "2.0"

  GuardrailHttpApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref GuardrailHttpApi
      RouteKey: ANY /{proxy+}
      Target: !Sub "integrations/${GuardrailHttpApiIntegration}"

  GuardrailHttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      StageName: $default
      ApiId: !Ref GuardrailHttpApi
      AutoDeploy: true

  # ── Lambda invoke permission for API Gateway ───────────────────────────
  GuardrailFunctionPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref GuardrailFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${GuardrailHttpApi}/*/*/*"

  # ── SSM Parameter Store (standard tier, free) ─────────────────────────
  GuardrailApiKeyParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /guardrail/api-key
      Type: String
      Value: !Ref ApiKeyParamValue
      Description: API key for Action Guardrail /evaluate endpoint

  GuardrailMongoUriParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /guardrail/mongo-uri
      Type: String
      Value: !Ref MongoUriParamValue
      Description: MongoDB Atlas connection string

  GuardrailMongoDbNameParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /guardrail/mongo-db-name
      Type: String
      Value: !Ref MongoDbNameParamValue
      Description: MongoDB database name (separate from HF Spaces deployment)

  GuardrailGroqApiKeyParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: /guardrail/groq-api-key
      Type: String
      Value: !Ref GroqApiKeyParamValue
      Description: Optional Groq API key for /query endpoint

Outputs:
  GuardrailApiEndpoint:
    Description: HTTP API endpoint URL
    Value: !Sub "https://${GuardrailHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  GuardrailFunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt GuardrailFunction.Arn
